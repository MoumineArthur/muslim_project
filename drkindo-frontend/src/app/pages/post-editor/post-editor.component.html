<div class="min-h-screen bg-gray-900 text-white p-6 flex justify-center">
  <div class="w-full max-w-3xl">
    <div class="flex items-center gap-4 mb-6">
      <a routerLink="/media" class="text-gray-400 hover:text-white transition">
        <i class="fas fa-arrow-left"></i> Retour
      </a>
      <h1 class="text-3xl font-bold">Publier un Média</h1>
    </div>

    <div *ngIf="loading" class="text-center py-10">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-white mx-auto"></div>
      <p class="mt-4 text-gray-400">Analyse et extraction des métadonnées...</p>
    </div>

    <div *ngIf="!loading && media" class="bg-gray-800 rounded-lg shadow-lg overflow-hidden flex flex-col md:flex-row">
      <!-- Info Media -->
      <div class="bg-gray-900/50 p-6 md:w-1/3 border-r border-gray-700 flex flex-col gap-4">
        <div>
          <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-1">Fichier source</h3>
          <p class="font-medium break-words">{{ media.filename }}</p>
        </div>
        
        <div>
          <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-1">Dossier</h3>
          <p class="text-gray-300">{{ media.folder?.name || 'Racine' }}</p>
        </div>

        <div class="mt-auto pt-4 border-t border-gray-700">
          <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-2">Aperçu Audio</h3>
          <audio controls [src]="streamUrl" class="w-full h-10 rounded"></audio>
        </div>
      </div>

      <!-- Formulaire -->
      <form (ngSubmit)="submit()" class="p-6 md:w-2/3 flex flex-col gap-5">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Titre de la publication <span class="text-red-500">*</span></label>
          <input type="text" [(ngModel)]="title" name="title" required
            class="w-full bg-gray-700 border border-gray-600 rounded-md px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Ex: Conférence sur la patience">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Auteur <span class="text-red-500">*</span></label>
          <select [(ngModel)]="selectedAuthorId" name="author" required
            class="w-full bg-gray-700 border border-gray-600 rounded-md px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option [ngValue]="undefined" disabled>Sélectionner un auteur</option>
            <option *ngFor="let author of authors" [ngValue]="author.id">{{ author.name }}</option>
          </select>
          <p *ngIf="authors.length === 0" class="text-xs text-yellow-500 mt-1">Aucun auteur disponible. Veuillez en créer un via l'API.</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Description</label>
          <textarea [(ngModel)]="description" name="description" rows="3"
            class="w-full bg-gray-700 border border-gray-600 rounded-md px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
            placeholder="Ajoutez du contexte..."></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Tags (séparés par des virgules)</label>
          <input type="text" [(ngModel)]="tagsText" name="tags"
            class="w-full bg-gray-700 border border-gray-600 rounded-md px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Ex: Rappel, Fiqh, Prière">
        </div>

        <div class="mt-4 flex justify-end gap-3">
          <button type="button" routerLink="/media" class="px-5 py-2 rounded-md bg-gray-700 hover:bg-gray-600 font-medium transition">
            Annuler
          </button>
          <button type="submit" [disabled]="saving || !title || !selectedAuthorId" 
            class="px-5 py-2 rounded-md bg-blue-600 hover:bg-blue-500 disabled:opacity-50 font-medium transition flex items-center gap-2">
            <i *ngIf="saving" class="fas fa-spinner fa-spin"></i>
            Publier
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
