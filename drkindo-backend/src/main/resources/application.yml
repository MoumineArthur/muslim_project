server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/drkindo_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  devtools:
    restart:
      enabled: true
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

app:
  jwt:
    secret: drkindo-super-secret-jwt-key-at-least-256-bits-long-for-security
    expiration: 86400000 # 24h en ms
  media:
    scan-path: ./../drkindo
    allowed-types: mp3,wav,ogg,aac,m4a,flac,mp4,avi,mkv,webm
  cors:
    allowed-origins: http://localhost:4200
  admin:
    username: admin
    email: admin@drkindo.com
    password: Admin@1234 # ⚠️ Changez ce mot de passe en production !
